<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Track My Rent</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/assets/css/auth.css">
<link rel="stylesheet" href="/assets/css/toast.css">
<script src="/assets/js/config.js"></script>
</head>

<body>

<div class="auth-wrapper">

  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-circle">TMR</span>
      <h1>Track My Rent</h1>
      <p>Rental Automation Platform</p>
    </div>

    <h2>Login to your account</h2>

    <form id="loginForm">

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email" inputmode="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="auth-btn">Login</button>

      <p class="switch">
        <a href="forgot-password.html">Forgot password?</a>
      </p>

      <p class="switch">
        Don't have an account?
        <a href="register.html">Create account</a>
      </p>

    </form>

  </div>

</div>

<script src="/assets/js/toast.js"></script>
<script src="/assets/js/auth.js"></script>

</body>
</html>
