<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sign Lease Agreement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      padding: 30px;
    }

    .card {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    canvas {
      width: 100%;
      height: 200px;
      border: 2px dashed #cbd5e1;
      border-radius: 8px;
      margin-top: 10px;
      cursor: crosshair;
    }

    .actions {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    button {
      padding: 10px 18px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-clear {
      background: #e5e7eb;
    }

    .btn-sign {
      background: #2563eb;
      color: white;
    }
  </style>
  <link rel="stylesheet" href="assets/css/toast.css" />
</head>

<body>

<div class="card">
  <h2>Lease Agreement Signature</h2>
  <p>Please sign below to confirm acceptance of this lease agreement.</p>

  <!-- Single, correct canvas -->
  <canvas id="signatureCanvas"></canvas>

  <div class="actions">
    <button class="btn-clear" onclick="clearSignature()">Clear</button>
    <button class="btn-sign" onclick="submitSignature()">Sign Lease</button>
  </div>
</div>

<!-- Only one JS file -->
<script src="assets/js/config.js"></script>
<script src="assets/js/sign-lease.js"></script>
  <script src="assets/js/toast.js"></script>
</body>
</html>
