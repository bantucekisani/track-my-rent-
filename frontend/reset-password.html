<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password | Track My Rent</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/assets/css/auth.css">
<script src="/assets/js/config.js"></script>
</head>

<body>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-circle">TMR</span>
      <h1>Track My Rent</h1>
      <p>Create a new password</p>
    </div>

    <h2>Reset Password</h2>

    <form id="resetPasswordForm">
      <div class="form-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Enter a new password" autocomplete="new-password" minlength="8" required>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm your new password" autocomplete="new-password" minlength="8" required>
      </div>

      <button type="submit" class="auth-btn">Reset Password</button>

      <p class="switch">
        <a href="login.html">Back to login</a>
      </p>
    </form>
  </div>
</div>

<script src="/assets/js/auth.js"></script>

</body>
</html>
