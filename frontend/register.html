<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | Track My Rent</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/assets/css/auth.css">
<link rel="stylesheet" href="/assets/css/toast.css">
<script src="/assets/js/config.js"></script>
</head>

<body>

<div class="auth-wrapper">

  <div class="auth-card">

    <div class="auth-logo">
      <span class="logo-circle">TMR</span>
      <h1>Track My Rent</h1>
      <p>Create your landlord account</p>
    </div>

    <h2>Get Started</h2>

    <form id="registerForm">

      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" placeholder="Enter your full name" autocomplete="name" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" autocomplete="email" inputmode="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Create a password" autocomplete="new-password" minlength="8" required>
      </div>

      <div class="form-group">
        <label for="phone">Phone Number (optional)</label>
        <input type="text" id="phone" placeholder="Enter phone number" autocomplete="tel" inputmode="tel">
      </div>

      <div class="form-group">
        <label for="businessName">Business Name (optional)</label>
        <input type="text" id="businessName" placeholder="Enter business name" autocomplete="organization">
      </div>

      <button type="submit" class="auth-btn">Create Account</button>

      <p class="switch">
        Already have an account?
        <a href="login.html">Login</a>
      </p>

    </form>

  </div>

</div>

<script src="/assets/js/toast.js"></script>
<script src="/assets/js/auth.js"></script>

</body>
</html>
